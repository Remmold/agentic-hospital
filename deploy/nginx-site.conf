server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Needed so the viz can discover simulation JSON files at runtime
    location /assets/simulation_results/ {
        autoindex on;
        autoindex_format html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
