services:
  reverse-proxy:
    image: traefik:v3.1
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=nw@lifeatlas.online"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"  # optional
    networks:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    restart: unless-stopped

  app:
    build: .
    container_name: hospital-simulation-phaser
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      VECTOR_STORE_DIR: /app/vector_store
    volumes:
      - vector_store:/app/vector_store
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      # HTTPS router
      - "traefik.http.routers.app.rule=Host(`hospital-simulation.lifeatlas.online`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=le"

      # HTTP router → redirect to HTTPS
      - "traefik.http.routers.app-http.rule=Host(`hospital-simulation.lifeatlas.online`)"
      - "traefik.http.routers.app-http.entrypoints=web"
      - "traefik.http.routers.app-http.middlewares=app-https-redirect"

      # Redirect middleware
      - "traefik.http.middlewares.app-https-redirect.redirectscheme.scheme=https"

      # Service
      - "traefik.http.services.app.loadbalancer.server.port=8000"

networks:
  web:
    external: false

volumes:
  vector_store:
  letsencrypt:
    driver: local
